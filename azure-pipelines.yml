# =============================================================================
#  OnlineSuperMarket — Azure DevOps CI/CD Pipeline
#
#  Stages:
#    CI  → checkout submodules → build backend + frontend → push to ACR
#    CD  → SSH to Azure VM → pull images → restart stack → health check
#
#  ─── SETUP: Pipelines → Library → Variable Group ─────────────────────────────
#  Group name : onlinesupermarket-secrets
#
#  Variable            Example                              Secret?
#  ─────────────────── ──────────────────────────────────── ───────
#  ACR_LOGIN_SERVER    myregistry.azurecr.io                no
#  ACR_USERNAME        myregistry                           no
#  ACR_PASSWORD        <ACR → Access keys → password>       YES ✓
#  VM_HOST             20.1.2.3                             no
#  VM_USER             azureuser                            no
#  VM_SSH_KEY          -----BEGIN OPENSSH PRIVATE KEY-----  YES ✓
#  PORT                5000                                  no
#  MONGODB_URI         mongodb://mongo:27017/SuperMarket     YES ✓
#  ALLOWED_ORIGINS     http://yourdomain.com                 no
#  REACT_APP_API_URL   http://yourdomain.com:5000            no
#
#  ─── VM PRE-REQUISITES ───────────────────────────────────────────────────────
#  • Docker Engine installed
#  • VM_USER in docker group:   sudo usermod -aG docker $VM_USER
#  • ACR Admin enabled:
#      Azure Portal → Container Registry → Settings → Access keys → Admin ON
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - "*.md"
      - ".gitignore"

pr:
  branches:
    include:
      - main

variables:
  - group: onlinesupermarket-secrets
  - name: API_IMAGE
    value: "onlinesupermarket-api"
  - name: FRONTEND_IMAGE
    value: "onlinesupermarket-frontend"
  - name: COMPOSE_PROJECT
    value: "onlinesupermarket"

# =============================================================================
#  STAGE 1 — CI : Build & Push images to ACR
# =============================================================================
stages:

- stage: CI
  displayName: "CI — Build & Push"
  jobs:

  - job: BuildAndPush
    displayName: "Build Docker images → ACR"
    pool:
      vmImage: "ubuntu-latest"

    steps:

    # ── Checkout (includes submodules: backend + frontend) ────────────────────
    - checkout: self
      displayName: "Checkout + submodules"
      submodules: true
      fetchDepth: 0

    # ── Compute 8-char image tag from git SHA ─────────────────────────────────
    - bash: |
        SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-8)
        echo "Image tag: $SHORT_SHA"
        echo "##vso[task.setvariable variable=SHORT_SHA;isOutput=true]$SHORT_SHA"
      name: setVars
      displayName: "Compute image tag"

    # ── Login to ACR ──────────────────────────────────────────────────────────
    - bash: |
        echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
          --username "$(ACR_USERNAME)" \
          --password-stdin
      displayName: "ACR Login"

    # ── Build & push backend ──────────────────────────────────────────────────
    - bash: |
        set -euo pipefail
        IMAGE="$(ACR_LOGIN_SERVER)/$(API_IMAGE)"
        TAG="$(setVars.SHORT_SHA)"

        docker build \
          --file  backend/Dockerfile \
          --tag   "${IMAGE}:${TAG}" \
          --tag   "${IMAGE}:latest" \
          --cache-from "${IMAGE}:latest" \
          backend/

        docker push "${IMAGE}:${TAG}"
        docker push "${IMAGE}:latest"
        echo "Pushed ${IMAGE}:${TAG}"
      displayName: "Build & Push — Backend"

    # ── Build & push frontend (bakes REACT_APP_API_URL into bundle) ───────────
    - bash: |
        set -euo pipefail
        IMAGE="$(ACR_LOGIN_SERVER)/$(FRONTEND_IMAGE)"
        TAG="$(setVars.SHORT_SHA)"

        docker build \
          --file  frontend/Dockerfile \
          --build-arg REACT_APP_API_URL="$(REACT_APP_API_URL)" \
          --tag   "${IMAGE}:${TAG}" \
          --tag   "${IMAGE}:latest" \
          --cache-from "${IMAGE}:latest" \
          frontend/

        docker push "${IMAGE}:${TAG}"
        docker push "${IMAGE}:latest"
        echo "Pushed ${IMAGE}:${TAG}"
      displayName: "Build & Push — Frontend"

    # ── Logout (always) ───────────────────────────────────────────────────────
    - bash: docker logout "$(ACR_LOGIN_SERVER)"
      displayName: "ACR Logout"
      condition: always()

    # ── Publish compose file as artifact for CD stage ─────────────────────────
    - bash: |
        cp docker-compose.yml "$(Build.ArtifactStagingDirectory)/docker-compose.yml"
      displayName: "Stage artifact"

    - task: PublishBuildArtifacts@1
      displayName: "Publish compose artifact"
      inputs:
        PathtoPublish: "$(Build.ArtifactStagingDirectory)"
        ArtifactName: "deploy"

# =============================================================================
#  STAGE 2 — CD : Deploy to Azure VM via SSH
#  Only runs on main branch after CI passes
# =============================================================================
- stage: CD
  displayName: "CD — Deploy to VM"
  dependsOn: CI
  condition: >
    and(
      succeeded('CI'),
      eq(variables['Build.SourceBranchName'], 'main')
    )

  variables:
    SHORT_SHA: $[ stageDependencies.CI.BuildAndPush.outputs['setVars.SHORT_SHA'] ]

  jobs:

  - deployment: VMDeploy
    displayName: "SSH deploy"
    pool:
      vmImage: "ubuntu-latest"
    environment: "production"

    strategy:
      runOnce:
        deploy:
          steps:

          # ── Download compose artifact ─────────────────────────────────────────
          - download: current
            artifact: deploy
            displayName: "Download compose artifact"

          # ── Write SSH key + trust VM host ─────────────────────────────────────
          - bash: |
              mkdir -p ~/.ssh
              chmod 700 ~/.ssh
              printf '%s\n' "$(VM_SSH_KEY)" > ~/.ssh/deploy_key
              chmod 600 ~/.ssh/deploy_key
              ssh-keyscan -H "$(VM_HOST)" >> ~/.ssh/known_hosts 2>/dev/null
              echo "SSH key ready."
            displayName: "Install SSH key"

          # ── Write the deploy script locally, then copy + run on VM ───────────
          # This avoids all heredoc quoting/escaping issues.
          - bash: |
              cat > /tmp/deploy.sh << 'SCRIPT'
              #!/usr/bin/env bash
              set -euo pipefail

              echo "============================================"
              echo " OnlineSuperMarket deploy  |  tag: $IMAGE_TAG"
              echo "============================================"

              # 1. Login to ACR
              echo "[1/5] ACR login..."
              echo "$ACR_PASSWORD" | docker login "$ACR_LOGIN_SERVER" \
                --username "$ACR_USERNAME" --password-stdin

              # 2. Write .env (600 perms — secrets never in logs)
              echo "[2/5] Writing .env..."
              cat > ~/supermarket.env << ENV
              PORT=$PORT
              MONGODB_URI=$MONGODB_URI
              ALLOWED_ORIGINS=$ALLOWED_ORIGINS
              REACT_APP_API_URL=$REACT_APP_API_URL
              ENV
              chmod 600 ~/supermarket.env

              # 3. Pull new images from ACR
              echo "[3/5] Pulling images..."
              docker pull "$ACR_LOGIN_SERVER/$API_IMAGE:$IMAGE_TAG"
              docker pull "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE:$IMAGE_TAG"

              # 4. Write compose override — swap build: for image: (no local build on VM)
              echo "[4/5] Writing compose override..."
              cat > ~/docker-compose.override.yml << OVERRIDE
              services:
                api:
                  image: $ACR_LOGIN_SERVER/$API_IMAGE:$IMAGE_TAG
                  build: !reset null
                frontend:
                  image: $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:$IMAGE_TAG
                  build: !reset null
              OVERRIDE

              # 5. Stop old stack → start new stack
              echo "[5/5] Restarting stack..."
              docker compose \
                -f ~/docker-compose.yml \
                -f ~/docker-compose.override.yml \
                -p "$COMPOSE_PROJECT" \
                --env-file ~/supermarket.env \
                down --remove-orphans || true

              docker compose \
                -f ~/docker-compose.yml \
                -f ~/docker-compose.override.yml \
                -p "$COMPOSE_PROJECT" \
                --env-file ~/supermarket.env \
                up -d --no-build

              docker logout "$ACR_LOGIN_SERVER"

              # Health checks
              echo "Waiting 20s for services..."
              sleep 20

              docker compose \
                -f ~/docker-compose.yml \
                -p "$COMPOSE_PROJECT" \
                ps

              API_HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
                "http://localhost:$PORT/health" 2>/dev/null || echo "000")
              WEB_HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
                "http://localhost:80" 2>/dev/null || echo "000")

              echo ""
              echo "  API  /health  →  HTTP $API_HTTP"
              echo "  Web  /        →  HTTP $WEB_HTTP"
              echo ""

              if [ "$API_HTTP" != "200" ]; then
                echo "ERROR: API health check failed — last 80 log lines:"
                docker logs "${COMPOSE_PROJECT}-api-1" --tail 80 2>&1 || true
                exit 1
              fi

              echo "Deploy complete!  tag=$IMAGE_TAG"
              SCRIPT
              chmod +x /tmp/deploy.sh
              echo "Deploy script written."
            displayName: "Write deploy script"

          # ── Copy compose file + deploy script to VM ───────────────────────────
          - bash: |
              scp -i ~/.ssh/deploy_key \
                  -o StrictHostKeyChecking=no \
                  -o BatchMode=yes \
                  "$(Pipeline.Workspace)/deploy/docker-compose.yml" \
                  /tmp/deploy.sh \
                  "$(VM_USER)@$(VM_HOST):~/"
              echo "Files copied to VM."
            displayName: "Copy files to VM"

          # ── Execute deploy script on VM ───────────────────────────────────────
          # All Azure DevOps variables are expanded here on the agent BEFORE SSH.
          # The script receives them as plain env vars — no quoting ambiguity.
          - bash: |
              ssh -i ~/.ssh/deploy_key \
                  -o StrictHostKeyChecking=no \
                  -o BatchMode=yes \
                  "$(VM_USER)@$(VM_HOST)" \
                  "chmod +x ~/deploy.sh && \
                   ACR_LOGIN_SERVER='$(ACR_LOGIN_SERVER)' \
                   ACR_USERNAME='$(ACR_USERNAME)' \
                   ACR_PASSWORD='$(ACR_PASSWORD)' \
                   API_IMAGE='$(API_IMAGE)' \
                   FRONTEND_IMAGE='$(FRONTEND_IMAGE)' \
                   IMAGE_TAG='$(SHORT_SHA)' \
                   COMPOSE_PROJECT='$(COMPOSE_PROJECT)' \
                   PORT='$(PORT)' \
                   MONGODB_URI='$(MONGODB_URI)' \
                   ALLOWED_ORIGINS='$(ALLOWED_ORIGINS)' \
                   REACT_APP_API_URL='$(REACT_APP_API_URL)' \
                   ~/deploy.sh"
            displayName: "Run deploy on VM"
            env:
              # Explicit env mapping so Azure masks secret values in logs
              ACR_LOGIN_SERVER:  $(ACR_LOGIN_SERVER)
              ACR_USERNAME:      $(ACR_USERNAME)
              ACR_PASSWORD:      $(ACR_PASSWORD)
              VM_USER:           $(VM_USER)
              VM_HOST:           $(VM_HOST)
              SHORT_SHA:         $(SHORT_SHA)
              API_IMAGE:         $(API_IMAGE)
              FRONTEND_IMAGE:    $(FRONTEND_IMAGE)
              COMPOSE_PROJECT:   $(COMPOSE_PROJECT)
              PORT:              $(PORT)
              MONGODB_URI:       $(MONGODB_URI)
              ALLOWED_ORIGINS:   $(ALLOWED_ORIGINS)
              REACT_APP_API_URL: $(REACT_APP_API_URL)

          # ── Cleanup SSH key from agent (always runs) ──────────────────────────
          - bash: |
              rm -f ~/.ssh/deploy_key /tmp/deploy.sh
              echo "Cleaned up."
            displayName: "Cleanup"
            condition: always()
