# =============================================================================
#  OnlineSuperMarket — Azure DevOps CI/CD Pipeline
#
#  Stages:
#    CI  → checkout submodules → build backend + frontend → push to ACR
#    CD  → SSH to Azure VM → pull images → restart stack → health check
#
#  ─── SETUP: Pipelines → Library → Variable Group ─────────────────────────────
#  Group name : onlinesupermarket-secrets
#
#  Variable            Example                              Secret?
#  ─────────────────── ──────────────────────────────────── ───────
#  ACR_LOGIN_SERVER    myregistry.azurecr.io                no
#  ACR_USERNAME        myregistry                           no
#  ACR_PASSWORD        <ACR → Access keys → password>       YES ✓
#  VM_HOST             20.1.2.3                             no
#  VM_USER             azureuser                            no
#  VM_SSH_KEY_B64      base64 -w 0 key.pem  (single-line)   YES ✓
#  PORT                5000                                  no
#  MONGODB_URI         mongodb://mongo:27017/SuperMarket     YES ✓
#
#  ─── VM PRE-REQUISITES ───────────────────────────────────────────────────────
#  • Docker Engine installed
#  • VM_USER in docker group:   sudo usermod -aG docker $VM_USER
#  • ACR Admin enabled:
#      Azure Portal → Container Registry → Settings → Access keys → Admin ON
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - "*.md"
      - ".gitignore"

pr:
  branches:
    include:
      - main

variables:
  - group: onlinesupermarket-secrets
  - name: API_IMAGE
    value: "onlinesupermarket-api"
  - name: FRONTEND_IMAGE
    value: "onlinesupermarket-frontend"
  - name: COMPOSE_PROJECT
    value: "onlinesupermarket"

# =============================================================================
#  STAGE 1 — CI : Build & Push images to ACR
# =============================================================================
stages:

- stage: CI
  displayName: "CI — Build & Push"
  jobs:

  - job: BuildBackend
    displayName: "Build & Push — Backend"
    pool:
      vmImage: "ubuntu-latest"
    steps:

    - checkout: self
      displayName: "Checkout"
      submodules: true
      fetchDepth: 0

    - bash: |
        SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-8)
        echo "##vso[task.setvariable variable=SHORT_SHA;isOutput=true]$SHORT_SHA"
      name: setVars
      displayName: "Compute image tag"

    - bash: |
        echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
          --username "$(ACR_USERNAME)" --password-stdin
      displayName: "ACR Login"

    - bash: |
        set -euo pipefail
        IMAGE="$(ACR_LOGIN_SERVER)/$(API_IMAGE)"
        TAG="$(setVars.SHORT_SHA)"

        docker build \
          --file  backend/Dockerfile \
          --tag   "${IMAGE}:${TAG}" \
          --tag   "${IMAGE}:latest" \
          backend/

        docker push "${IMAGE}:${TAG}"
        docker push "${IMAGE}:latest"
        echo "Pushed ${IMAGE}:${TAG}"
      displayName: "Build & Push"

    - bash: docker logout "$(ACR_LOGIN_SERVER)"
      displayName: "ACR Logout"
      condition: always()

  - job: BuildFrontend
    displayName: "Build & Push — Frontend"
    pool:
      vmImage: "ubuntu-latest"
    steps:

    - checkout: self
      displayName: "Checkout"
      submodules: true
      fetchDepth: 0

    - bash: |
        SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-8)
        echo "##vso[task.setvariable variable=SHORT_SHA;isOutput=true]$SHORT_SHA"
      name: setVars
      displayName: "Compute image tag"

    - bash: |
        echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
          --username "$(ACR_USERNAME)" --password-stdin
      displayName: "ACR Login"

    - bash: |
        set -euo pipefail
        IMAGE="$(ACR_LOGIN_SERVER)/$(FRONTEND_IMAGE)"
        TAG="$(setVars.SHORT_SHA)"

        docker build \
          --file  frontend/Dockerfile \
          --tag   "${IMAGE}:${TAG}" \
          --tag   "${IMAGE}:latest" \
          frontend/

        docker push "${IMAGE}:${TAG}"
        docker push "${IMAGE}:latest"
        echo "Pushed ${IMAGE}:${TAG}"
      displayName: "Build & Push"

    - bash: docker logout "$(ACR_LOGIN_SERVER)"
      displayName: "ACR Logout"
      condition: always()

  - job: PublishArtifact
    displayName: "Publish compose artifact"
    pool:
      vmImage: "ubuntu-latest"
    dependsOn: []
    steps:

    - checkout: self
      displayName: "Checkout"

    - bash: |
        cp docker-compose.yml "$(Build.ArtifactStagingDirectory)/docker-compose.yml"
      displayName: "Stage artifact"

    - task: PublishBuildArtifacts@1
      displayName: "Publish compose artifact"
      inputs:
        PathtoPublish: "$(Build.ArtifactStagingDirectory)"
        ArtifactName: "deploy"

# =============================================================================
#  STAGE 2 — CD : Deploy to Azure VM via SSH
#  Only runs on main branch after CI passes
# =============================================================================
- stage: CD
  displayName: "CD — Deploy to VM"
  dependsOn: CI
  condition: >
    and(
      succeeded('CI'),
      eq(variables['Build.SourceBranchName'], 'main')
    )

  variables:
    SHORT_SHA: $[ stageDependencies.CI.BuildBackend.outputs['setVars.SHORT_SHA'] ]

  jobs:

  - job: VMDeploy
    displayName: "SSH deploy"
    pool:
      vmImage: "ubuntu-latest"

    steps:

    # ── Download compose artifact ───────────────────────────────────────────
    - task: DownloadBuildArtifacts@1
      displayName: "Download compose artifact"
      inputs:
        buildType: "current"
        artifactName: "deploy"
        downloadPath: "$(System.ArtifactsDirectory)"

    # ── Write SSH key + trust VM host ───────────────────────────────────────
    - bash: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "$(VM_SSH_KEY_B64)" | base64 -d > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H "$(VM_HOST)" >> ~/.ssh/known_hosts 2>/dev/null
        echo "SSH key ready."
      displayName: "Install SSH key"

    # ── Write deploy script ─────────────────────────────────────────────────
    - bash: |
        cat > /tmp/deploy.sh << 'SCRIPT'
        #!/usr/bin/env bash
        set -euo pipefail

        echo "============================================"
        echo " OnlineSuperMarket deploy  |  tag: $IMAGE_TAG"
        echo "============================================"

        # 1. Login to ACR
        echo "[1/5] ACR login..."
        echo "$ACR_PASSWORD" | docker login "$ACR_LOGIN_SERVER" \
          --username "$ACR_USERNAME" --password-stdin

        # 2. Write .env
        echo "[2/5] Writing .env..."
        cat > ~/supermarket.env << ENV
        PORT=$PORT
        MONGODB_URI=$MONGODB_URI
        ENV
        chmod 600 ~/supermarket.env

        # 3. Pull new images from ACR
        echo "[3/5] Pulling images..."
        docker pull "$ACR_LOGIN_SERVER/$API_IMAGE:$IMAGE_TAG"
        docker pull "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE:$IMAGE_TAG"

        # 4. Write compose override
        echo "[4/5] Writing compose override..."
        cat > ~/docker-compose.override.yml << OVERRIDE
        services:
          api:
            image: $ACR_LOGIN_SERVER/$API_IMAGE:$IMAGE_TAG
            build: !reset null
          frontend:
            image: $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:$IMAGE_TAG
            build: !reset null
        OVERRIDE

        # 5. Restart stack
        echo "[5/5] Restarting stack..."
        docker compose \
          -f ~/docker-compose.yml \
          -f ~/docker-compose.override.yml \
          -p "$COMPOSE_PROJECT" \
          --env-file ~/supermarket.env \
          down --remove-orphans || true

        docker compose \
          -f ~/docker-compose.yml \
          -f ~/docker-compose.override.yml \
          -p "$COMPOSE_PROJECT" \
          --env-file ~/supermarket.env \
          up -d --no-build

        docker logout "$ACR_LOGIN_SERVER"

        # Wait for API to be ready (up to 60s)
        echo "Waiting for services..."
        for i in $(seq 1 12); do
          API_HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            "http://localhost:3000/api/health" 2>/dev/null || echo "000")
          if [ "$API_HTTP" = "200" ]; then break; fi
          echo "  attempt $i/12 — HTTP $API_HTTP, retrying in 5s..."
          sleep 5
        done

        docker compose -f ~/docker-compose.yml -p "$COMPOSE_PROJECT" ps

        API_HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
          "http://localhost:3000/api/health" 2>/dev/null || echo "000")
        WEB_HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
          "http://localhost:3000" 2>/dev/null || echo "000")

        echo ""
        echo "  API  /api/health  →  HTTP $API_HTTP"
        echo "  Web  /            →  HTTP $WEB_HTTP"
        echo ""

        if [ "$API_HTTP" != "200" ]; then
          echo "ERROR: API health check failed — last 80 log lines:"
          docker logs supermarket_api --tail 80 2>&1 || true
          exit 1
        fi

        echo "Deploy complete!  tag=$IMAGE_TAG"
        SCRIPT
        chmod +x /tmp/deploy.sh
        echo "Deploy script written."
      displayName: "Write deploy script"

    # ── Copy files to VM ────────────────────────────────────────────────────
    - bash: |
        scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            "$(System.ArtifactsDirectory)/deploy/docker-compose.yml" \
            /tmp/deploy.sh \
            "$(VM_USER)@$(VM_HOST):~/"
        echo "Files copied to VM."
      displayName: "Copy files to VM"

    # ── Run deploy script on VM ─────────────────────────────────────────────
    - bash: |
        ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            "$(VM_USER)@$(VM_HOST)" \
            "chmod +x ~/deploy.sh && \
             ACR_LOGIN_SERVER='$(ACR_LOGIN_SERVER)' \
             ACR_USERNAME='$(ACR_USERNAME)' \
             ACR_PASSWORD='$(ACR_PASSWORD)' \
             API_IMAGE='$(API_IMAGE)' \
             FRONTEND_IMAGE='$(FRONTEND_IMAGE)' \
             IMAGE_TAG='$(SHORT_SHA)' \
             COMPOSE_PROJECT='$(COMPOSE_PROJECT)' \
             PORT='$(PORT)' \
             MONGODB_URI='$(MONGODB_URI)' \
             ~/deploy.sh"
      displayName: "Run deploy on VM"
      env:
        ACR_LOGIN_SERVER:  $(ACR_LOGIN_SERVER)
        ACR_USERNAME:      $(ACR_USERNAME)
        ACR_PASSWORD:      $(ACR_PASSWORD)
        VM_USER:           $(VM_USER)
        VM_HOST:           $(VM_HOST)
        SHORT_SHA:         $(SHORT_SHA)
        API_IMAGE:         $(API_IMAGE)
        FRONTEND_IMAGE:    $(FRONTEND_IMAGE)
        COMPOSE_PROJECT:   $(COMPOSE_PROJECT)
        PORT:              $(PORT)
        MONGODB_URI:       $(MONGODB_URI)

    # ── Cleanup ─────────────────────────────────────────────────────────────
    - bash: |
        rm -f ~/.ssh/deploy_key /tmp/deploy.sh
        echo "Cleaned up."
      displayName: "Cleanup"
      condition: always()
