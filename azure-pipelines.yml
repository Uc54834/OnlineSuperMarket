# =============================================================================
#  OnlineSuperMarket — Azure DevOps CI/CD Pipeline
#
#  Stages:
#    CI  → build backend + frontend images in parallel → push to ACR
#    CD  → runs ON the Azure VM (self-hosted agent) → pull from ACR → restart
#
#  ─── SETUP: Pipelines → Library → Variable Group ─────────────────────────────
#  Group name : onlinesupermarket-secrets
#
#  Variable          Example                            Secret?
#  ───────────────── ────────────────────────────────── ───────
#  ACR_LOGIN_SERVER  myregistry.azurecr.io              no
#  ACR_USERNAME      myregistry                         no
#  ACR_PASSWORD      <ACR → Access keys → password>     YES ✓
#  PORT              5000                               no
#  MONGODB_URI       mongodb://mongo:27017/SuperMarket  YES ✓
#
#  ─── SELF-HOSTED AGENT SETUP (one-time on your Azure VM) ────────────────────
#  mkdir ~/azagent && cd ~/azagent
#  curl -O https://vstsagentpackage.azureedge.net/agent/3.236.1/vsts-agent-linux-x64-3.236.1.tar.gz
#  tar zxvf vsts-agent-linux-x64-3.236.1.tar.gz
#  ./config.sh
#    Server URL : https://dev.azure.com/<your-org>
#    Auth type  : PAT
#    PAT        : User Settings → Personal Access Tokens → Agent Pools: Read & Manage
#    Pool name  : Default
#  sudo ./svc.sh install && sudo ./svc.sh start
#  sudo usermod -aG docker $USER
#
#  ─── VM PRE-REQUISITES ───────────────────────────────────────────────────────
#  • Docker Engine installed
#  • ACR Admin enabled:
#      Azure Portal → Container Registry → Settings → Access keys → Admin ON
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - "*.md"
      - ".gitignore"

pr:
  branches:
    include:
      - main

variables:
  - group: onlinesupermarket-secrets
  - name: API_IMAGE
    value: "onlinesupermarket-api"
  - name: FRONTEND_IMAGE
    value: "onlinesupermarket-frontend"
  - name: COMPOSE_PROJECT
    value: "onlinesupermarket"

# =============================================================================
#  STAGE 1 — CI : Build & Push images to ACR (parallel jobs)
# =============================================================================
stages:

- stage: CI
  displayName: "CI — Build & Push"
  jobs:

  - job: BuildBackend
    displayName: "Build & Push — Backend"
    pool:
      vmImage: "ubuntu-latest"
    steps:

    - checkout: self
      displayName: "Checkout"
      submodules: true
      fetchDepth: 0

    - bash: |
        SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-8)
        echo "##vso[task.setvariable variable=SHORT_SHA;isOutput=true]$SHORT_SHA"
      name: setVars
      displayName: "Compute image tag"

    - bash: |
        echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
          --username "$(ACR_USERNAME)" --password-stdin
      displayName: "ACR Login"

    - bash: |
        set -euo pipefail
        IMAGE="$(ACR_LOGIN_SERVER)/$(API_IMAGE)"
        TAG="$(setVars.SHORT_SHA)"
        docker build --file backend/Dockerfile \
          --tag "${IMAGE}:${TAG}" --tag "${IMAGE}:latest" backend/
        docker push "${IMAGE}:${TAG}"
        docker push "${IMAGE}:latest"
        echo "Pushed ${IMAGE}:${TAG}"
      displayName: "Build & Push"

    - bash: docker logout "$(ACR_LOGIN_SERVER)"
      displayName: "ACR Logout"
      condition: always()

  - job: BuildFrontend
    displayName: "Build & Push — Frontend"
    pool:
      vmImage: "ubuntu-latest"
    steps:

    - checkout: self
      displayName: "Checkout"
      submodules: true
      fetchDepth: 0

    - bash: |
        SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-8)
        echo "##vso[task.setvariable variable=SHORT_SHA;isOutput=true]$SHORT_SHA"
      name: setVars
      displayName: "Compute image tag"

    - bash: |
        echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
          --username "$(ACR_USERNAME)" --password-stdin
      displayName: "ACR Login"

    - bash: |
        set -euo pipefail
        IMAGE="$(ACR_LOGIN_SERVER)/$(FRONTEND_IMAGE)"
        TAG="$(setVars.SHORT_SHA)"
        docker build --file frontend/Dockerfile \
          --tag "${IMAGE}:${TAG}" --tag "${IMAGE}:latest" frontend/
        docker push "${IMAGE}:${TAG}"
        docker push "${IMAGE}:latest"
        echo "Pushed ${IMAGE}:${TAG}"
      displayName: "Build & Push"

    - bash: docker logout "$(ACR_LOGIN_SERVER)"
      displayName: "ACR Logout"
      condition: always()

# =============================================================================
#  STAGE 2 — CD : Deploy directly on the Azure VM
#  Self-hosted agent runs ON the VM — pulls images from ACR, no SSH needed
# =============================================================================
- stage: CD
  displayName: "CD — Deploy on VM"
  dependsOn: CI
  condition: >
    and(
      succeeded('CI'),
      eq(variables['Build.SourceBranchName'], 'main')
    )

  variables:
    SHORT_SHA: $[ stageDependencies.CI.BuildBackend.outputs['setVars.SHORT_SHA'] ]

  jobs:

  - job: Deploy
    displayName: "Pull from ACR & restart stack"
    pool:
      name: Default        # self-hosted agent running ON the Azure VM

    steps:

    # ── Checkout (to get docker-compose.yml) ───────────────────────────────
    - checkout: self
      displayName: "Checkout"

    # ── Login to ACR ───────────────────────────────────────────────────────
    - bash: |
        echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
          --username "$(ACR_USERNAME)" --password-stdin
      displayName: "ACR Login"
      env:
        ACR_PASSWORD: $(ACR_PASSWORD)

    # ── Pull new images from ACR ────────────────────────────────────────────
    - bash: |
        set -euo pipefail
        docker pull "$(ACR_LOGIN_SERVER)/$(API_IMAGE):$(SHORT_SHA)"
        docker pull "$(ACR_LOGIN_SERVER)/$(FRONTEND_IMAGE):$(SHORT_SHA)"
        echo "Images pulled."
      displayName: "Pull images from ACR"

    # ── Write .env (no heredoc indentation issues — use printf) ────────────
    - bash: |
        printf 'PORT=%s\nMONGODB_URI=%s\n' "$(PORT)" "$(MONGODB_URI)" > ~/supermarket.env
        chmod 600 ~/supermarket.env
        echo ".env written."
      displayName: "Write .env"
      env:
        PORT:        $(PORT)
        MONGODB_URI: $(MONGODB_URI)

    # ── Write compose override (ACR images, no local build) ────────────────
    - bash: |
        printf 'services:\n  api:\n    image: %s\n    build: !reset null\n  frontend:\n    image: %s\n    build: !reset null\n' \
          "$(ACR_LOGIN_SERVER)/$(API_IMAGE):$(SHORT_SHA)" \
          "$(ACR_LOGIN_SERVER)/$(FRONTEND_IMAGE):$(SHORT_SHA)" \
          > ~/docker-compose.override.yml
        echo "Compose override written."
      displayName: "Write compose override"

    # ── Copy compose file from repo ────────────────────────────────────────
    - bash: |
        cp "$(Build.SourcesDirectory)/docker-compose.yml" ~/docker-compose.yml
        echo "docker-compose.yml copied."
      displayName: "Copy docker-compose.yml"

    # ── Restart stack ──────────────────────────────────────────────────────
    - bash: |
        set -euo pipefail
        docker compose \
          -f ~/docker-compose.yml \
          -f ~/docker-compose.override.yml \
          -p "$(COMPOSE_PROJECT)" \
          --env-file ~/supermarket.env \
          down --remove-orphans || true

        docker compose \
          -f ~/docker-compose.yml \
          -f ~/docker-compose.override.yml \
          -p "$(COMPOSE_PROJECT)" \
          --env-file ~/supermarket.env \
          up -d --no-build

        echo "Stack restarted."
      displayName: "Restart stack"

    # ── ACR Logout ─────────────────────────────────────────────────────────
    - bash: docker logout "$(ACR_LOGIN_SERVER)"
      displayName: "ACR Logout"
      condition: always()

    # ── Health check ───────────────────────────────────────────────────────
    - bash: |
        set -euo pipefail
        echo "Waiting for services..."
        for i in $(seq 1 12); do
          API_HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            "http://localhost:3000/api/health" 2>/dev/null || echo "000")
          if [ "$API_HTTP" = "200" ]; then
            echo "  API ready after attempt $i"
            break
          fi
          echo "  attempt $i/12 — HTTP $API_HTTP, retrying in 5s..."
          sleep 5
        done

        WEB_HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
          "http://localhost:3000" 2>/dev/null || echo "000")

        echo ""
        echo "  API  /api/health  →  HTTP $API_HTTP"
        echo "  Web  /            →  HTTP $WEB_HTTP"
        echo ""

        if [ "$API_HTTP" != "200" ]; then
          echo "ERROR: API health check failed — logs:"
          docker logs supermarket_api --tail 80 2>&1 || true
          exit 1
        fi

        echo "Deploy complete!  tag=$(SHORT_SHA)"
      displayName: "Health check"
