# =============================================================================
#  OnlineSuperMarket — Azure DevOps CI/CD Pipeline
#
#  Stages:
#    CI  → build backend + frontend images in parallel → push to ACR
#    CD  → Microsoft-hosted agent SSHs into VM → pull from ACR → restart
#
#  ─── SETUP: Pipelines → Library → Variable Group ─────────────────────────────
#  Group name : onlinesupermarket-secrets
#
#  Variable          Example                            Secret?
#  ───────────────── ────────────────────────────────── ───────
#  ACR_LOGIN_SERVER  myregistry.azurecr.io              no
#  ACR_USERNAME      myregistry                         no
#  ACR_PASSWORD      <ACR → Access keys → password>     YES ✓
#  VM_HOST           20.1.2.3                           no
#  VM_USER           azureuser                          no
#  VM_SSH_KEY_B64    base64 -w 0 key.pem                YES ✓
#  PORT              5000                               no
#  MONGODB_URI       mongodb://mongo:27017/SuperMarket  YES ✓
#
#  ─── VM PRE-REQUISITES ───────────────────────────────────────────────────────
#  • Docker + docker compose installed
#  • VM_USER in docker group: sudo usermod -aG docker $VM_USER
#  • Port 22 open in Azure NSG (inbound rule)
#  • ACR Admin enabled: Portal → Container Registry → Access keys → Admin ON
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - "*.md"
      - ".gitignore"

pr:
  branches:
    include:
      - main

variables:
  - group: onlinesupermarket-secrets
  - name: API_IMAGE
    value: "onlinesupermarket-api"
  - name: FRONTEND_IMAGE
    value: "onlinesupermarket-frontend"
  - name: COMPOSE_PROJECT
    value: "onlinesupermarket"

# =============================================================================
#  STAGE 1 — CI : Build & Push images to ACR (parallel jobs)
# =============================================================================
stages:

- stage: CI
  displayName: "CI — Build & Push"
  jobs:

  - job: BuildBackend
    displayName: "Build & Push — Backend"
    pool:
      vmImage: "ubuntu-latest"
    steps:

    - checkout: self
      displayName: "Checkout"
      submodules: true
      fetchDepth: 0

    - bash: |
        SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-8)
        echo "##vso[task.setvariable variable=SHORT_SHA;isOutput=true]$SHORT_SHA"
      name: setVars
      displayName: "Compute image tag"

    - bash: |
        echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
          --username "$(ACR_USERNAME)" --password-stdin
      displayName: "ACR Login"

    - bash: |
        set -euo pipefail
        IMAGE="$(ACR_LOGIN_SERVER)/$(API_IMAGE)"
        TAG="$(setVars.SHORT_SHA)"
        docker build --file backend/Dockerfile \
          --tag "${IMAGE}:${TAG}" --tag "${IMAGE}:latest" backend/
        docker push "${IMAGE}:${TAG}"
        docker push "${IMAGE}:latest"
        echo "Pushed ${IMAGE}:${TAG}"
      displayName: "Build & Push"

    - bash: docker logout "$(ACR_LOGIN_SERVER)"
      displayName: "ACR Logout"
      condition: always()

  - job: BuildFrontend
    displayName: "Build & Push — Frontend"
    pool:
      vmImage: "ubuntu-latest"
    steps:

    - checkout: self
      displayName: "Checkout"
      submodules: true
      fetchDepth: 0

    - bash: |
        SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-8)
        echo "##vso[task.setvariable variable=SHORT_SHA;isOutput=true]$SHORT_SHA"
      name: setVars
      displayName: "Compute image tag"

    - bash: |
        echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
          --username "$(ACR_USERNAME)" --password-stdin
      displayName: "ACR Login"

    - bash: |
        set -euo pipefail
        IMAGE="$(ACR_LOGIN_SERVER)/$(FRONTEND_IMAGE)"
        TAG="$(setVars.SHORT_SHA)"
        docker build --file frontend/Dockerfile \
          --tag "${IMAGE}:${TAG}" --tag "${IMAGE}:latest" frontend/
        docker push "${IMAGE}:${TAG}"
        docker push "${IMAGE}:latest"
        echo "Pushed ${IMAGE}:${TAG}"
      displayName: "Build & Push"

    - bash: docker logout "$(ACR_LOGIN_SERVER)"
      displayName: "ACR Logout"
      condition: always()

# =============================================================================
#  STAGE 2 — CD : SSH into VM and deploy
#  Requires port 22 open in Azure NSG for Microsoft-hosted agent IPs
# =============================================================================
- stage: CD
  displayName: "CD — Deploy to VM"
  dependsOn: CI
  condition: >
    and(
      succeeded('CI'),
      eq(variables['Build.SourceBranchName'], 'main')
    )

  variables:
    SHORT_SHA: $[ stageDependencies.CI.BuildBackend.outputs['setVars.SHORT_SHA'] ]

  jobs:

  - job: Deploy
    displayName: "SSH deploy"
    pool:
      vmImage: "ubuntu-latest"

    steps:

    # ── Install SSH key ─────────────────────────────────────────────────────
    - bash: |
        mkdir -p ~/.ssh && chmod 700 ~/.ssh
        echo "$(VM_SSH_KEY_B64)" | base64 -d > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H "$(VM_HOST)" >> ~/.ssh/known_hosts 2>/dev/null
        echo "SSH key ready."
      displayName: "Install SSH key"
      env:
        VM_SSH_KEY_B64: $(VM_SSH_KEY_B64)

    # ── Copy docker-compose.yml to VM ───────────────────────────────────────
    - bash: |
        scp -i ~/.ssh/deploy_key \
          -o StrictHostKeyChecking=no \
          -o BatchMode=yes \
          docker-compose.yml \
          "$(VM_USER)@$(VM_HOST):~/docker-compose.yml"
        echo "Copied docker-compose.yml to VM."
      displayName: "Copy compose file"
      env:
        VM_USER: $(VM_USER)
        VM_HOST: $(VM_HOST)

    # ── Deploy on VM ────────────────────────────────────────────────────────
    - bash: |
        ssh -i ~/.ssh/deploy_key \
          -o StrictHostKeyChecking=no \
          -o BatchMode=yes \
          "$(VM_USER)@$(VM_HOST)" \
          "ACR_LOGIN_SERVER='$(ACR_LOGIN_SERVER)' \
           ACR_USERNAME='$(ACR_USERNAME)' \
           ACR_PASSWORD='$(ACR_PASSWORD)' \
           API_IMAGE='$(API_IMAGE)' \
           FRONTEND_IMAGE='$(FRONTEND_IMAGE)' \
           IMAGE_TAG='$(SHORT_SHA)' \
           COMPOSE_PROJECT='$(COMPOSE_PROJECT)' \
           PORT='$(PORT)' \
           MONGODB_URI='$(MONGODB_URI)' \
           bash -s" << 'ENDSSH'
        set -euo pipefail

        echo "=== [1/5] ACR login ==="
        echo "$ACR_PASSWORD" | docker login "$ACR_LOGIN_SERVER" \
          --username "$ACR_USERNAME" --password-stdin

        echo "=== [2/5] Writing .env ==="
        printf 'PORT=%s\nMONGODB_URI=%s\n' "$PORT" "$MONGODB_URI" > ~/supermarket.env
        chmod 600 ~/supermarket.env

        echo "=== [3/5] Pulling images ==="
        docker pull "$ACR_LOGIN_SERVER/$API_IMAGE:$IMAGE_TAG"
        docker pull "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE:$IMAGE_TAG"

        echo "=== [4/5] Writing compose override ==="
        cat > ~/docker-compose.override.yml << EOF
        services:
          api:
            image: $ACR_LOGIN_SERVER/$API_IMAGE:$IMAGE_TAG
            build: !reset null
          frontend:
            image: $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:$IMAGE_TAG
            build: !reset null
        EOF

        echo "=== [5/5] Restarting stack ==="
        docker compose \
          -f ~/docker-compose.yml \
          -f ~/docker-compose.override.yml \
          -p "$COMPOSE_PROJECT" \
          --env-file ~/supermarket.env \
          down --remove-orphans || true

        docker compose \
          -f ~/docker-compose.yml \
          -f ~/docker-compose.override.yml \
          -p "$COMPOSE_PROJECT" \
          --env-file ~/supermarket.env \
          up -d --no-build

        docker logout "$ACR_LOGIN_SERVER"

        echo "Waiting for services..."
        for i in $(seq 1 12); do
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            http://localhost:3000/api/health 2>/dev/null || echo "000")
          [ "$HTTP" = "200" ] && { echo "Ready after attempt $i"; break; }
          echo "  attempt $i/12 — HTTP $HTTP, retrying in 5s..."
          sleep 5
        done

        HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
          http://localhost:3000/api/health 2>/dev/null || echo "000")
        if [ "$HTTP" != "200" ]; then
          echo "ERROR: health check failed"
          docker logs supermarket_api --tail 80 2>&1 || true
          exit 1
        fi

        echo "Deploy complete! tag=$IMAGE_TAG"
        ENDSSH
      displayName: "Deploy on VM"
      env:
        ACR_LOGIN_SERVER: $(ACR_LOGIN_SERVER)
        ACR_USERNAME:     $(ACR_USERNAME)
        ACR_PASSWORD:     $(ACR_PASSWORD)
        VM_USER:          $(VM_USER)
        VM_HOST:          $(VM_HOST)
        API_IMAGE:        $(API_IMAGE)
        FRONTEND_IMAGE:   $(FRONTEND_IMAGE)
        SHORT_SHA:        $(SHORT_SHA)
        COMPOSE_PROJECT:  $(COMPOSE_PROJECT)
        PORT:             $(PORT)
        MONGODB_URI:      $(MONGODB_URI)

    # ── Cleanup ────────────────────────────────────────────────────────────
    - bash: rm -f ~/.ssh/deploy_key
      displayName: "Cleanup"
      condition: always()
